spring.application.name=gateway
#Server
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:2707/eureka/
#Gateway
spring.cloud.gateway.server.webmvc.routes[0].id=user
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8080/
spring.cloud.gateway.server.webmvc.routes[0].predicates=path=/api/**